<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIA — Registrar institución</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --negro:#0a0a0f; --tinta:#12121a; --carbon:#1e1e2e; --linea:#2a2a3e;
      --acento:#4f8ef7; --acento2:#7c6af7; --blanco:#f0f0f8; --gris:#8888aa;
      --error:#f7614f; --exito:#4fca8e;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:var(--negro); color:var(--blanco); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:3rem 1.5rem; }

    .top { width:100%; max-width:680px; display:flex; align-items:center; justify-content:space-between; margin-bottom:2.5rem; }
    .logo { font-family:'DM Serif Display',serif; font-size:2rem; background:linear-gradient(135deg,var(--acento),var(--acento2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .volver { font-size:0.82rem; color:var(--gris); text-decoration:none; display:flex; align-items:center; gap:0.4rem; transition:color 0.2s; }
    .volver:hover { color:var(--blanco); }

    .contenedor { width:100%; max-width:680px; animation:bajar 0.6s ease both; }
    h1 { font-family:'DM Serif Display',serif; font-size:2.2rem; font-weight:400; margin-bottom:0.4rem; }
    .subtitulo { font-size:0.88rem; color:var(--gris); margin-bottom:2.5rem; line-height:1.6; }

    .seccion-titulo {
      font-size:0.72rem; font-weight:600; letter-spacing:0.16em; text-transform:uppercase;
      color:var(--acento); margin-bottom:1rem; margin-top:2rem; padding-bottom:0.5rem;
      border-bottom:1px solid var(--linea);
    }
    .seccion-titulo:first-of-type { margin-top:0; }

    .grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .grid.uno { grid-template-columns:1fr; }

    .campo { display:flex; flex-direction:column; gap:0.4rem; }
    .campo label { font-size:0.75rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--gris); }
    .campo input, .campo select {
      padding:0.8rem 1rem; background:var(--carbon); border:1px solid var(--linea);
      border-radius:9px; color:var(--blanco); font-family:'DM Sans',sans-serif;
      font-size:0.92rem; outline:none; transition:border-color 0.2s, box-shadow 0.2s;
      appearance:none;
    }
    .campo input:focus, .campo select:focus { border-color:var(--acento); box-shadow:0 0 0 3px #4f8ef718; }
    .campo input::placeholder { color:var(--gris); opacity:0.5; }

    .msg-error { display:none; background:#f7614f18; border:1px solid #f7614f44; border-radius:8px; padding:0.75rem 1rem; font-size:0.85rem; color:var(--error); margin-bottom:1.2rem; }
    .msg-error.visible { display:block; }
    .msg-exito { display:none; background:#4fca8e18; border:1px solid #4fca8e44; border-radius:8px; padding:1rem; font-size:0.88rem; color:var(--exito); margin-bottom:1.2rem; text-align:center; line-height:1.6; }
    .msg-exito.visible { display:block; }

    .btn {
      margin-top:2rem; width:100%; padding:0.95rem; background:linear-gradient(135deg,var(--acento),var(--acento2));
      border:none; border-radius:10px; color:#fff; font-family:'DM Sans',sans-serif;
      font-size:0.95rem; font-weight:600; cursor:pointer; transition:opacity 0.2s, transform 0.15s;
    }
    .btn:hover { opacity:0.9; transform:translateY(-1px); }
    .btn.cargando { opacity:0.6; pointer-events:none; }
    .spinner { display:none; width:18px; height:18px; border:2px solid #ffffff55; border-top-color:#fff; border-radius:50%; animation:girar 0.7s linear infinite; margin:0 auto; }
    .btn.cargando .txt { display:none; } .btn.cargando .spinner { display:block; }

    .pie { text-align:center; margin-top:1.5rem; font-size:0.82rem; color:var(--gris); }
    .pie a { color:var(--acento); text-decoration:none; font-weight:500; }

    @keyframes bajar { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes girar { to{transform:rotate(360deg)} }
    @media(max-width:560px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="top">
    <div class="logo">SIA</div>
    <a href="login.html" class="volver">← Volver al inicio</a>
  </div>

  <div class="contenedor">
    <h1>Registrar institución</h1>
    <p class="subtitulo">Completa el formulario. El equipo SIA revisará tu solicitud y te notificará por correo.</p>

    <div class="msg-error" id="msgError"></div>
    <div class="msg-exito" id="msgExito"></div>

    <form id="form" novalidate>
      <div class="seccion-titulo">Datos de la institución</div>
      <div class="grid">
        <div class="campo">
          <label>Nombre del colegio *</label>
          <input type="text" id="nombre" placeholder="Institución Educativa..." required />
        </div>
        <div class="campo">
          <label>Código DANE *</label>
          <input type="text" id="codigo_dane" placeholder="123456789012" required />
        </div>
        <div class="campo">
          <label>Correo institucional *</label>
          <input type="email" id="email_inst" placeholder="rectoria@colegio.edu.co" required />
        </div>
        <div class="campo">
          <label>Teléfono</label>
          <input type="tel" id="telefono" placeholder="300 000 0000" />
        </div>
        <div class="campo">
          <label>Municipio</label>
          <input type="text" id="municipio" placeholder="Bogotá" />
        </div>
        <div class="campo">
          <label>Departamento</label>
          <input type="text" id="departamento" placeholder="Cundinamarca" />
        </div>
      </div>

      <div class="seccion-titulo">Datos del administrador (rector)</div>
      <div class="grid">
        <div class="campo">
          <label>Nombre completo *</label>
          <input type="text" id="admin_nombre" placeholder="Carlos Pérez" required />
        </div>
        <div class="campo">
          <label>Correo del administrador *</label>
          <input type="email" id="admin_email" placeholder="rector@colegio.edu.co" required />
        </div>
        <div class="campo">
          <label>Contraseña *</label>
          <input type="password" id="admin_password" placeholder="Mínimo 8 caracteres" required />
        </div>
        <div class="campo">
          <label>Confirmar contraseña *</label>
          <input type="password" id="admin_password2" placeholder="Repite la contraseña" required />
        </div>
      </div>

      <button type="submit" class="btn" id="btn">
        <span class="txt">Enviar solicitud</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="pie">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></div>
  </div>

  <script>
    const API = 'http://localhost:3000';
    const form = document.getElementById('form');
    const btn  = document.getElementById('btn');

    function error(msg) {
      const el = document.getElementById('msgError');
      el.textContent = msg; el.classList.add('visible');
      document.getElementById('msgExito').classList.remove('visible');
    }
    function exito(msg) {
      const el = document.getElementById('msgExito');
      el.innerHTML = msg; el.classList.add('visible');
      document.getElementById('msgError').classList.remove('visible');
      form.style.display = 'none';
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      document.getElementById('msgError').classList.remove('visible');

      const password  = document.getElementById('admin_password').value;
      const password2 = document.getElementById('admin_password2').value;
      if (password !== password2) return error('Las contraseñas no coinciden.');
      if (password.length < 8)    return error('La contraseña debe tener al menos 8 caracteres.');

      btn.classList.add('cargando');
      try {
        const res = await fetch(`${API}/api/instituciones/solicitar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre:         document.getElementById('nombre').value.trim(),
            codigo_dane:    document.getElementById('codigo_dane').value.trim(),
            email_inst:     document.getElementById('email_inst').value.trim(),
            telefono:       document.getElementById('telefono').value.trim(),
            municipio:      document.getElementById('municipio').value.trim(),
            departamento:   document.getElementById('departamento').value.trim(),
            admin_nombre:   document.getElementById('admin_nombre').value.trim(),
            admin_email:    document.getElementById('admin_email').value.trim(),
            admin_password: password,
          }),
        });
        const data = await res.json();
        if (!data.ok) return error(data.mensaje || 'Error al enviar la solicitud.');
        exito(`✅ <strong>Solicitud enviada correctamente.</strong><br>Recibirás una respuesta en <strong>${document.getElementById('admin_email').value}</strong> cuando sea revisada.`);
      } catch {
        error('No se pudo conectar con el servidor.');
      } finally {
        btn.classList.remove('cargando');
      }
    });
  </script>
</body>
</html>
